# Office Dashboard Screen
# Recursive flex layout with coordinated data and theme

screen: office
route: /screen/office
resolution:
  width: 1280
  height: 720
input:
  type: numpad
  keyboard_id: officekeypad

theme:
  screen-bg: "#1a1a2e"
  panel-bg: rgba(255, 255, 255, 0.06)
  panel-radius: 12px
  panel-shadow: 0 4px 16px rgba(0, 0, 0, 0.3)
  panel-border: 1px solid rgba(255, 255, 255, 0.12)
  panel-blur: blur(12px)
  panel-padding: 1rem
  font-family: Roboto Condensed, sans-serif
  font-color: "#e0e0e0"
  accent-color: "#4fc3f7"

data:
  weather:
    source: /api/v1/home/weather
    refresh: 60

layout:
  direction: row
  gap: 1rem
  children:
    - direction: column
      basis: 25%
      shrink: 0
      gap: 0.5rem
      children:
        - widget: clock
          grow: 0
          shrink: 0
        - widget: weather
          grow: 0
          shrink: 0
        - widget: weather-forecast
          grow: 0
          shrink: 1
        - widget: entropy
          basis: 40%
          grow: 0
          shrink: 0
    - direction: column
      grow: 1
      gap: 0.5rem
      children:
        - widget: calendar
          grow: 1
        - direction: row
          grow: 0
          shrink: 0
          gap: 0.5rem
          children:
            - widget: finance
              basis: 50%
              grow: 1
              shrink: 1
            - widget: health
              basis: 50%
              grow: 1
              shrink: 1

subscriptions:
  midi:
    on:
      event: session_start
    response:
      overlay: piano
      mode: fullscreen
      priority: high
    dismiss:
      event: session_end
      inactivity: 30
