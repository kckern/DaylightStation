# Fitness app configuration
# Layout, data sources, and theme for the screen-framework home view

home_screen:
  theme:
    panel-bg: "rgba(255, 255, 255, 0.06)"
    panel-radius: 12px
    panel-shadow: "0 4px 16px rgba(0, 0, 0, 0.3)"
    panel-border: "1px solid rgba(255, 255, 255, 0.12)"
    panel-blur: "blur(12px)"
    panel-padding: 1rem
    font-family: "Roboto Condensed, sans-serif"
    font-color: "#e0e0e0"
  data:
    weight:
      source: /api/v1/health/weight
      refresh: 300
    nutrition:
      source: /api/v1/health/daily?days=10
      refresh: 300
    sessions:
      source: /api/v1/fitness/sessions?since=30d&limit=20
      refresh: 300
  layout:
    direction: row
    gap: 1rem
    children:
      - widget: "fitness:sessions"
        basis: "33%"
      - slot: detail-area
        default:
          direction: column
          gap: 0.5rem
          children:
            - widget: "fitness:weight"
            - widget: "fitness:nutrition"
      - direction: column
        gap: 0.5rem
        children:
          - widget: "fitness:upnext"
          - widget: "fitness:coach"

plex:
  nav_items:
    - name: Home
      type: view_direct
      icon: home
      target:
        view: home
      order: -1
