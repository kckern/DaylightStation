; DaylightStation ir-blaster firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; A config-driven IR transmitter. Named IR codes (power, hdmi1, hdmi2, hdmi3, …)
; are decoded host-side from Tuya-format base64 into raw microsecond timing
; arrays (see tools/gen-config.mjs) and blasted on the ATOM's onboard IR LED
; (GPIO12) via IRremoteESP8266's sendRaw at a 38 kHz carrier. Triggered over
; HTTP: `GET /send?code=NAME`. See ../README.md.
;
; PREREQ (one-time): generate include/config.h from the household SSOT —
;   node tools/gen-config.mjs <dataDir>/household/config/ir-blasters.yml [blaster-id]
;
; Build + flash:
;   node tools/flash.mjs <dataDir>/household/config/ir-blasters.yml [blaster-id] [--port /dev/cu.usbserial-XXXX]
; or directly:
;   pio run -e m5-atom -t upload --upload-port /dev/cu.usbserial-XXXX

[env:m5-atom]
; 6.5.0 ships Arduino-ESP32 2.0.x (IDF 4.4). No BLE here, but we keep the same
; pin so this matches the rest of the ATOM fleet (food-scale-relay, etc.).
platform = espressif32@6.5.0
board = m5stack-atom              ; ESP32-PICO-D4; IR LED GPIO12, SK6812 RGB GPIO27
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=1
lib_deps =
  crankyoldgit/IRremoteESP8266@^2.8.6   ; sendRaw() with hardware 38kHz carrier on ESP32
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0                ; single onboard RGB status LED
