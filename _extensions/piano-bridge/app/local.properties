# local.properties — machine-specific SDK/NDK locations. NOT committed in real
# Android projects (this placeholder is provided only because the authoring
# machine has no SDK/NDK installed). Replace these with your real paths.
#
# macOS (Android Studio default):
#   sdk.dir=/Users/<you>/Library/Android/sdk
#
# The NDK is resolved from android.ndkVersion in app/build.gradle, which must
# match an NDK actually installed under $sdk.dir/ndk/<version>/. Install via:
#   sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"
#
sdk.dir=/PATH/TO/Android/sdk
