; DaylightStation obd-relay firmware — Freematics ONE+ Model B
; (ESP32 16MB flash / 8MB PSRAM, u-blox M9 GNSS, SIM7670 LTE, OBD co-processor).
;
; Trips log to onboard flash while driving; buffered trips + live snapshots go
; over WebSocket to the DaylightStation event bus (/ws) whenever the car is on
; home WiFi. See ../README.md and docs/_wip/plans/2026-07-14-obd-relay-design.md.
;
; PREREQ (one-time): generate include/config.h from the household SSOT —
;   node tools/gen-config.mjs <dataDir>/household/config/vehicles.yml [vehicle-id]
; PREREQ (hardware env): vendor the FreematicsPlus library —
;   node tools/fetch-libs.mjs
;
; Build + flash:
;   node tools/flash.mjs [--port /dev/cu.xxx]
;
; ── VERIFY-ON-ARRIVAL ────────────────────────────────────────────────────────
; Board/partition/flags below are inferred from the vendor's firmware_v5
; PlatformIO project, NOT yet verified on the physical device. On arrival,
; diff against https://github.com/stanleyhuangyc/Freematics/tree/master/firmware_v5
; (telelogger) and fix: exact board def, flash mode, partition table, PSRAM flag.

[common]
framework = arduino
monitor_speed = 115200
lib_deps =
  links2004/WebSockets@^2.4.1     ; arduinoWebSockets (WS client)
  bblanchon/ArduinoJson@^7.1.0

; ── hardware target: Freematics ONE+ Model B ────────────────────────────────
[env:freematics-oneplus-b]
platform = espressif32@6.5.0      ; pinned like the sibling relays (Arduino core 2.x)
board = esp32dev                  ; VERIFY-ON-ARRIVAL: vendor may use a custom board def
board_build.flash_size = 16MB     ; VERIFY-ON-ARRIVAL
board_build.partitions = default_16MB.csv  ; VERIFY-ON-ARRIVAL (needs room for LittleFS trip buffer)
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_PSRAM             ; VERIFY-ON-ARRIVAL
  -DUSE_FREEMATICS              ; enables OBD co-processor + GNSS code paths
lib_deps =
  ${common.lib_deps}
  ; FreematicsPlus is vendored into lib/ by tools/fetch-libs.mjs (the vendor
  ; repo is not a registry package and the library lives in a subfolder).

; ── bench target: transport layer only, any dev ESP32 ───────────────────────
; Builds WITHOUT FreematicsPlus: WiFi + WS + trip buffer + simulated samples.
; Lets the WS/buffering/upload logic be exercised before the hardware arrives.
[env:bench-esp32]
platform = espressif32@6.5.0
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBENCH_SIM                   ; fabricate OBD/GNSS samples instead of reading hardware
lib_deps = ${common.lib_deps}
