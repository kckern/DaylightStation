; DaylightStation e-paper firmware — Seeed reTerminal E1003 (IT8951, 10.3" Gray16)
; Build:  pio run
; Flash:  pio run -t upload --upload-port /dev/cu.wchusbserial1120
; Monitor: pio device monitor -b 115200
;
; PREREQS (one-time):
;   1) node tools/gen-config.mjs <path-to-screens/kitchen-eink.yml>   -> include/config.h (gitignored)
;   2) scripts/fetch-seeed-pipeline.sh                                 -> lib/seeed/* (gitignored)
;
; The reTerminal E1003 is a XIAO-ESP32-S3 class board: 16MB flash (N16R8) + 8MB
; OPI PSRAM (confirmed via esptool). Seeed_GFX drives the IT8951 via Setup522.

[env:reterminal_e1003]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; 16MB flash + OPI (octal) PSRAM
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
  -DBOARD_HAS_PSRAM
  ; Select the E1003 panel via the lib's own mechanism. With USER_SETUP_LOADED
  ; left UNSET, Seeed_GFX's User_Setup_Select -> Dynamic_Setup keys on this and
  ; pulls in Setup522 + the IT8951 driver + TCON_ENABLE + board pins, resolving
  ; all of the lib's relative includes. (Do NOT -include Setup522 ourselves: it
  ; pulls <Wire.h> into the plain-C pngle/miniz files and breaks them.)
  -DBOARD_SCREEN_COMBO=522

lib_deps =
  https://github.com/Seeed-Studio/Seeed_GFX.git
; dither.* / pngle.* / miniz.* are vendored into lib/seeed/ by
; tools/fetch-deps.mjs (Seeed's own tested decode+dither pipeline).
