; DaylightStation e-paper firmware — multi-device.
;
; One firmware, many panels. Each Seeed E-series model differs in only three ways:
;   1) BOARD_SCREEN_COMBO  — selects the driver + pins + resolution in Seeed_GFX
;   2) EINK_* profile flag — selects the render/dither path in main.cpp
;   3) (everything else — wifi, /config, change-detection, sleep — is shared)
;
; Adding a panel = add one [env:<model>] block below + a screens/<panel>.yml SSOT.
;
; Build/flash a specific panel (driven by the SSOT's hardware.device):
;   node tools/flash.mjs <path-to>/screens/<panel>.yml [--port /dev/cu.xxx]
; or directly:
;   pio run -e e1004 -t upload --upload-port /dev/cu.wchusbserial1120
;
; PREREQS (one-time): node tools/gen-config.mjs <SSOT> -> include/config.h;
;                     node tools/fetch-deps.mjs        -> lib/seeed/* (gitignored)

; ---- shared base: every panel env inherits this --------------------------
[env]
platform = espressif32
board = seeed_xiao_esp32s3            ; XIAO-ESP32-S3 class (all reTerminal E-series)
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 16MB        ; N16R8 (16MB flash + 8MB OPI PSRAM), measured
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
  -DBOARD_HAS_PSRAM
lib_deps =
  https://github.com/Seeed-Studio/Seeed_GFX.git
; pngle/miniz (+ dither for color panels) vendored into lib/seeed/ by tools/fetch-deps.mjs.

; ---- per-device profiles -------------------------------------------------
; BOARD_SCREEN_COMBO lets Seeed_GFX's Dynamic_Setup pull in the model's Setup
; header (driver/pins/resolution). The EINK_* flag picks main.cpp's render path.

[env:e1003]                            ; kitchen — 10.3" mono IT8951, 16-gray, landscape 1872x1404
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=522 -DEINK_GRAY16

[env:e1004]                            ; upstairs — 13.3" Spectra-6 color T133A01, portrait 1200x1600
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=523 -DEINK_COLOR_E6
