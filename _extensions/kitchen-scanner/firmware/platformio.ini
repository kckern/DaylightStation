; DaylightStation kitchen-scanner firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; Zebra DS6878 over Classic Bluetooth SPP. The scanner is the SPP *Master* and
; dials this board; the board only listens. Decoded barcodes go out over
; WebSocket to the DaylightStation event bus (/ws). See ../README.md.
;
; SHARED SOURCE, SEPARATE BUILD. src/main.cpp here is a one-line shim that
; #includes the food-scale-relay firmware source: both boards need the same
; WiFi/WebSocket/HTTP-status/logging/button code, and duplicating ~1700 lines
; guarantees the two copies drift. (PlatformIO's `src_dir` does NOT work here —
; the ESP-IDF framework globs ${CMAKE_SOURCE_DIR}/src and ignores it.) Role is a
; compile flag the config generator derives from the SSOT — a device entry with
; no `ble:` block yields SCALE_ENABLED=0, so BLE scale discovery never starts.
;
; That flag is the whole point of this board existing: one ESP32 cannot run BLE
; discovery and hold a Classic-BT SPP link at the same time. The shared radio
; starves the link and it dies with HCI 0x08 (supervision timeout).
;
; Build + flash:
;   node tools/flash.mjs                        # gen config from SSOT, build, upload
; or:
;   DAYLIGHT_CONFIG_OUT=$PWD/include/config.h \
;     node ../../food-scale-relay/firmware/tools/gen-config.mjs \
;     "$DAYLIGHT_BASE_PATH/data/household/config/scales.yml" kitchen-scanner
;   pio run -e m5-atom-idf5 -t upload --upload-port /dev/cu.usbserial-XXXX

[env:m5-atom-idf5]
platform = /Users/kckern/.platformio/platforms/espressif32@src-596c9938872833461cb0fe93e12b1b9f
board = m5stack-atom
framework = arduino, espidf
monitor_speed = 115200
board_build.partitions = /Users/kckern/.platformio/packages/framework-arduinoespressif32/tools/partitions/huge_app.csv
build_flags =
  -DCORE_DEBUG_LEVEL=1
  ; Our own include/ first — the shared src does #include "config.h" and the
  ; food-scale-relay tree has its own generated copy for the OTHER board.
  -I${PROJECT_DIR}/include
  -I/Users/kckern/.platformio/packages/framework-espidf/components/esp_hid/private
  -I/Users/kckern/.platformio/packages/framework-arduinoespressif32-libs/esp32/include/bt/host/bluedroid/api/include/api
  -I/Users/kckern/.platformio/packages/framework-arduinoespressif32/libraries/BLE/src
lib_deps =
  links2004/WebSockets@^2.4.1
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0
