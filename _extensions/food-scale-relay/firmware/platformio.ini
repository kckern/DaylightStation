; DaylightStation food-scale-relay firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; BLE-bridges a KitchenIQ 50797 (SENSSUN FOOD) kitchen scale and streams decoded
; weight + button events over WebSocket to the DaylightStation event bus (/ws),
; which re-broadcasts the `food-scale` topic. See ../README.md and
; docs/plans/2026-07-10-food-scale-relay-design.md.
;
; PREREQ (one-time): generate include/config.h from the household SSOT —
;   node tools/gen-config.mjs <dataDir>/household/config/scales.yml [scale-id]
;
; Build + flash:
;   node tools/flash.mjs [--port /dev/cu.usbserial-XXXX]
; or directly:
;   pio run -e m5-atom -t upload --upload-port /dev/cu.usbserial-XXXX

[env:m5-atom]
; Pinned: 6.5.0 ships Arduino-ESP32 2.0.x (IDF 4.4), which matches the
; NimBLE-Arduino 1.4.x API used in main.cpp. Newer platforms pull Arduino core
; 3.x (IDF 5.x) and NimBLE 1.4.x faults at esp_bt_controller_init (INVALID_STATE).
platform = espressif32@6.5.0
board = m5stack-atom              ; ESP32-PICO-D4; button GPIO39, SK6812 RGB GPIO27
framework = arduino, espidf
monitor_speed = 115200
board_build.partitions = /Users/kckern/.platformio/packages/framework-arduinoespressif32/tools/partitions/huge_app.csv   ; 3MB single app (no OTA) — BLE+WiFi+WS is big
build_flags =
  -DCORE_DEBUG_LEVEL=1
  ; DS6878 publishes a large legacy HID descriptor; enlarge ESP-IDF 4.4's
  ; Classic HID SDP database beyond its 4 KB default.
  -DBTA_HH_DISC_BUF_SIZE=8192
  -I/Users/kckern/.platformio/packages/framework-espidf/components/esp_hid/private
lib_deps =
  links2004/WebSockets@^2.4.1     ; arduinoWebSockets (WS client)
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0          ; single onboard RGB status LED

; Experimental newer Bluetooth host, kept separate while validating DS6878.
[env:m5-atom-idf5]
platform = /Users/kckern/.platformio/platforms/espressif32@src-596c9938872833461cb0fe93e12b1b9f
board = m5stack-atom
framework = arduino, espidf
monitor_speed = 115200
board_build.partitions = /Users/kckern/.platformio/packages/framework-arduinoespressif32/tools/partitions/huge_app.csv
board_build.sdkconfig = sdkconfig.m5-atom
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -I/Users/kckern/.platformio/packages/framework-espidf/components/esp_hid/private
  -I/Users/kckern/.platformio/packages/framework-arduinoespressif32-libs/esp32/include/bt/host/bluedroid/api/include/api
  -I/Users/kckern/.platformio/packages/framework-arduinoespressif32/libraries/BLE/src
  -DBTA_HH_DISC_BUF_SIZE=8192
lib_deps =
  links2004/WebSockets@^2.4.1
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0
