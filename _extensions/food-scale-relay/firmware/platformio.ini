; DaylightStation food-scale-relay firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; BLE-bridges a KitchenIQ 50797 (SENSSUN FOOD) kitchen scale and, when the SSOT
; gives the device a `barcode:` block, also acts as a BLE HID central for a Zebra
; DS2278 scanner. Both stream over WiFi/WebSocket to the DaylightStation event
; bus (/ws). See ../README.md.
;
; NIMBLE, NOT BLUEDROID — and framework = arduino, NOT arduino+espidf. Both were
; learned the hard way on 2026-07-22/23:
;   1. The DS2278 is BLE HID, and its proven implementation (content-barcode-relay,
;      working end-to-end since 2026-07-11) is written against NimBLE. NimBLE and
;      Bluedroid are mutually exclusive: one BLE stack per binary.
;   2. Both radios being LE is what lets ONE board host the scale AND the scanner.
;      A Classic-BT link cannot survive a concurrent BLE scan (HCI 0x08,
;      supervision timeout, measured repeatedly). Classic BT now lives only in
;      ../../kitchen-scanner (DS6878), which keeps Bluedroid for that reason.
;   3. NimBLE-Arduino does not compile under `framework = arduino, espidf` here
;      (esp_timer_handle_t unresolved inside nimble_npl_os.h), so this mirrors
;      content-barcode-relay's build exactly rather than inventing a new one.
;
; PREREQ (one-time): generate include/config.h from the household SSOT —
;   node tools/gen-config.mjs <dataDir>/household/config/scales.yml [scale-id]
;
; Build + flash:
;   node tools/flash.mjs [--port /dev/cu.usbserial-XXXX]
; or directly:
;   pio run -e m5-atom -t upload --upload-port /dev/cu.usbserial-XXXX

[env:m5-atom]
; Pinned: 6.5.0 ships Arduino-ESP32 2.0.x (IDF 4.4), which matches the
; NimBLE-Arduino 1.4.x API used in main.cpp. Newer platforms pull Arduino core
; 3.x (IDF 5.x) and NimBLE 1.4.x faults at esp_bt_controller_init (INVALID_STATE).
platform = espressif32@6.5.0
board = m5stack-atom              ; ESP32-PICO-D4; button GPIO39, SK6812 RGB GPIO27
framework = arduino
monitor_speed = 115200
upload_speed = 115200             ; slow + tolerant — the FTDI link corrupts at high baud
board_build.partitions = huge_app.csv
build_flags =
  -DCORE_DEBUG_LEVEL=1
lib_deps =
  h2zero/NimBLE-Arduino@^1.4.3
  links2004/WebSockets@^2.4.1     ; arduinoWebSockets (WS client)
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0          ; single onboard RGB status LED
