# Example schema for the food-scale-relay SSOT. The REAL file lives in household
# data (private, Dropbox-synced), NOT in this repo:
#   data/household/config/scales.yml
#
# A registry: each key under `scales:` is one physical scale + its relay ESP. Add
# more keys (bathroom-scale, coffee-scale, …) and flash one ATOM per key with the
# matching id. The firmware build reads provisioning/backend/scales.<id>.ble; the
# backend accepts any relay client by `source`. Regenerate + reflash after editing:
#   node firmware/tools/flash.mjs <dataDir>/household/config/scales.yml <id>

provisioning:
  wifi_ssid: "YOUR_SSID"
  wifi_password: "YOUR_WIFI_PASSWORD"

backend:
  host: "daylightlocal.kckern.net"   # DaylightStation backend (event-bus host)
  port: 3111                         # event-bus WS port
  ws_path: /ws

# Backend persistence root (relative to data dir). The backend reads this and
# writes settled measurements + button events to <dir>/<scale-id>/<date>.yml.
# Omit to use the default (household/history/nutrition).
#
# A button press force-captures the live weight at that instant (settled or not).
# A settled weight is recorded once and not repeated until it changes by at least
# dedupDeltaG or the pan is emptied (<= emptyThresholdG) — this keeps the scale
# resting on its side on the shelf from re-logging the same weight forever.
persistence:
  dir: household/history/nutrition
  emptyThresholdG: 2   # at/below this the pan counts as empty → next placement is a fresh session
  dedupDeltaG: 2       # min change from the last recorded value to log a new settled reading

scales:
  kitchen-food-scale:
    label: "Kitchen food scale"
    device:
      board: m5-atom-lite            # ESP32-PICO-D4; button GPIO39, RGB GPIO27
      mac: "14:08:08:53:94:84"       # relay hardware MAC (informational)
    ble:
      match_name: "SENSSUN FOOD"     # scan target (KitchenIQ 50797 OEM name)
      service_uuid: "0000ffb0-0000-1000-8000-00805f9b34fb"
      notify_char:  "0000ffb2-0000-1000-8000-00805f9b34fb"
      decode:                        # verified against the physical scale
        weight_offset: 2             # uint16 big-endian weight
        endian: big
        divisor: 1                   # raw -> grams
        stable_byte: 6
        stable_value: 0xAA           # settled (0xA0 = changing)
        unit_byte: 8
        units: { 0x00: g, 0x02: ml }
    emit:
      min_delta_g: 1
      heartbeat_hz: 0.5
    topic: food-scale

# ---------------------------------------------------------------------------
# Nutribot integration: settled readings become density-logged food entries.
# Consumed by ScaleNutribotBridge / LogFoodFromScale. All keys optional — the
# backend supplies these same defaults (see
# backend/src/3_applications/nutribot/lib/scaleNutribotConfig.mjs). The target
# chat is NOT configured here; it is the household head (household.yml `head`).
nutribot:
  min_grams: 5              # ignore settled readings below this (noise / near-zero)
  containers:
    threshold_g: 150        # only offer container (tare) subtraction above this gross weight
    items:
      - { id: dinner-plate, label: "Dinner plate", emoji: "🍽", grams: 340 }
      - { id: dinner-bowl,  label: "Dinner bowl",  emoji: "🥣", grams: 250 }
      - { id: small-bowl,   label: "Small bowl",   emoji: "🍚", grams: 180 }
      - { id: mug,          label: "Mug",          emoji: "☕", grams: 350 }
  density_levels:           # ordinal + non-linear; kcal_per_g is the source of truth
    - { level: 1, label: "Watery",    emoji: "🥬", kcal_per_g: 0.2 }
    - { level: 2, label: "Light",     emoji: "🥗", kcal_per_g: 0.6 }
    - { level: 3, label: "Lean",      emoji: "🍲", kcal_per_g: 1.0 }
    - { level: 4, label: "Everyday",  emoji: "🍛", kcal_per_g: 1.4 }
    - { level: 5, label: "Hearty",    emoji: "🍝", kcal_per_g: 1.9 }
    - { level: 6, label: "Filling",   emoji: "🍕", kcal_per_g: 2.6 }
    - { level: 7, label: "Rich",      emoji: "🧀", kcal_per_g: 3.8 }
    - { level: 8, label: "Very rich", emoji: "🥜", kcal_per_g: 6.0 }
    - { level: 9, label: "Pure fat",  emoji: "🫒", kcal_per_g: 8.5 }
