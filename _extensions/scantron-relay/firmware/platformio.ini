; DaylightStation scantron-relay firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
; (Same board as food-scale-relay / barcode-relay — one toolchain for all three.
;  An ATOMS3 Lite also works but forks you onto an ESP32-S3 env for no benefit;
;  this relay only needs one UART + WiFi.)
;
; Taps the RS-232 serial output of a Chatsworth Data OMR 1200 bubble-sheet
; scanner (via an M5 ATOMIC RS232 base / MAX3232) and streams decoded sheet
; reads over WebSocket to the DaylightStation event bus (/ws), which re-
; broadcasts the `scantron` topic. See ../README.md.
;
; NO BLE here — transport is a plain UART. That's the whole point of this
; relay vs. barcode-relay: no bonding, no proprietary GATT.
;
; PREREQ (one-time): generate include/config.h from the household SSOT —
;   node tools/gen-config.mjs <dataDir>/household/config/scantrons.yml [reader-id]
;
; Build + flash:
;   node tools/flash.mjs [--port /dev/cu.usbmodem-XXXX]
; or directly:
;   pio run -e m5-atoms3 -t upload --upload-port /dev/cu.usbmodem-XXXX

[env:m5-atom]
platform = espressif32@6.5.0     ; Arduino-ESP32 2.0.x (IDF 4.4)
board = m5stack-atom             ; ESP32-PICO-D4; button GPIO39, SK6812 RGB GPIO27
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv   ; WiFi+WS is big; no OTA
build_flags =
  -DCORE_DEBUG_LEVEL=1
lib_deps =
  links2004/WebSockets@^2.4.1     ; arduinoWebSockets (WS client)
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.6.0          ; single onboard RGB status LED
