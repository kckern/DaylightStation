; DaylightStation barcode-relay firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; Bridges a Zebra DS2278 in SSI-Bluetooth-Low-Energy mode: bonds (SSI-BLE mandates
; LE Secure Connections — this is why macOS/bleak couldn't read it), subscribes to
; the SSI notify char, ACKs each DECODE_DATA packet, and (later) streams scans over
; WebSocket to the DaylightStation event bus. See ../README.md.
;
; Full path: BLE HID central -> decode -> WiFi WebSocket to the DaylightStation
; event bus (topic barcode-relay).
;
; CONFIG-DRIVEN (mirrors food-scale-relay): Wi-Fi creds + backend WS host/port/path +
; relay instance metadata + scanner BLE identity come from the household SSOT, NOT hardcoded.
; Generate the gitignored include/config.h FIRST, then build:
;   node tools/gen-config.mjs <data>/household/config/barcode-relay.yml <relay-id>   # -> include/config.h
;   pio run -e m5-atom -t upload --upload-port /dev/cu.usbserial-XXXX
; Monitor:  pio device monitor -b 115200   (or UDP :9999 — see logf/DEV-STATUS)
; config.example.h documents the config.h shape. Host is a stable HOSTNAME
; (daylightlocal.kckern.net), never a raw IP.

[env:m5-atom]
; Pinned to Arduino core 2.x (matches NimBLE-Arduino 1.4.x); see food-scale-relay.
platform = espressif32@6.5.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 115200            ; slow + tolerant — the FTDI link is marginal and corrupts at high baud
board_build.partitions = huge_app.csv
build_flags =
  -DCORE_DEBUG_LEVEL=1
lib_deps =
  h2zero/NimBLE-Arduino@^1.4.3
  fastled/FastLED@^3.6.0
  links2004/WebSockets@^2.4.1
  bblanchon/ArduinoJson@^7.1.0
