<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Fitness Simulation Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 12px;
      font-size: 13px;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .error {
      background: #8b0000;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .section {
      background: #252525;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }
    .gov-status {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .gov-status span {
      font-size: 12px;
    }
    .gov-cycle-info {
      background: #1e1e1e;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: #ccc;
      line-height: 1.5;
    }
    .gov-cycle-info strong {
      color: #f39c12;
    }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    button {
      background: #3a3a3a;
      border: none;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #4a4a4a; }
    button:active { background: #555; }
    button.danger { background: #6b2020; }
    button.danger:hover { background: #8b3030; }
    .device-list {
      max-height: none;
      overflow-y: auto;
    }
    .device {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .device-name {
      font-weight: 500;
    }
    .device-hr {
      font-family: monospace;
      font-size: 14px;
    }
    .device-hr.inactive { color: #666; }
    .hr-slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .hr-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    .hr-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #888;
    }
    .hr-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #888;
    }
    .hr-value {
      font-family: monospace;
      font-size: 13px;
      min-width: 52px;
      text-align: right;
    }
    .zone-buttons {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .zone-btn {
      flex: 1;
      padding: 4px 2px;
      font-size: 10px;
      border-radius: 3px;
      text-align: center;
    }
    .zone-btn.cool { background: #2563eb; }
    .zone-btn.active { background: #059669; }
    .zone-btn.warm { background: #d97706; }
    .zone-btn.hot { background: #dc2626; }
    .zone-btn.fire { background: #7c2d12; }
    .zone-btn.selected { outline: 2px solid white; }
    .auto-buttons {
      display: flex;
      gap: 4px;
    }
    .auto-buttons button {
      flex: 1;
      font-size: 11px;
      padding: 4px;
    }
    .auto-indicator {
      background: #059669;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
    }

    /* Equipment (cycling) — orange accent to distinguish from HR devices */
    .equipment-list {
      max-height: none;
      overflow-y: auto;
    }
    .equipment-tile {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      border-left: 3px solid #f39c12;
    }
    .equipment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .equipment-name {
      font-weight: 500;
    }
    .equipment-rpm {
      font-family: monospace;
      font-size: 14px;
      color: #f39c12;
    }
    .equipment-rpm.inactive { color: #666; }
    .equipment-eligible {
      font-size: 10px;
      color: #888;
      margin-bottom: 8px;
    }
    .rpm-slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .rpm-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
      accent-color: #f39c12;
    }
    .rpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      cursor: pointer;
      border: 2px solid #c97a0a;
    }
    .rpm-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      cursor: pointer;
      border: 2px solid #c97a0a;
    }
    .rpm-value {
      font-family: monospace;
      font-size: 13px;
      min-width: 64px;
      text-align: right;
      color: #f39c12;
    }
    .rpm-quick-row {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .rpm-quick-btn {
      flex: 1;
      font-size: 11px;
      padding: 4px 2px;
      background: #3b2a12;
    }
    .rpm-quick-btn:hover { background: #553d1a; }

    .cycle-ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cycle-ctrl select {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      font-size: 12px;
    }
    .cycle-ctrl .btn-row button {
      flex: 1;
      background: #5a3d10;
    }
    .cycle-ctrl .btn-row button:hover { background: #7a5418; }
  </style>
</head>
<body>
  <div id="app">
    <h1>
      Fitness Simulation Panel
      <button onclick="window.close()">X</button>
    </h1>
    <div id="content">Loading...</div>
  </div>

  <script>
    let controller = null;
    // Track HR slider values per device so render() preserves them during drags
    const sliderValues = {};
    let activeSlider = null;
    // Track RPM slider values per equipment so render() preserves them during drags
    const equipmentSliderValues = {};
    let activeEquipmentSlider = null;

    function init() {
      if (!window.opener) {
        showError('Open this panel from FitnessPlayer');
        return;
      }

      controller = window.opener.__fitnessSimController;
      if (!controller) {
        showError('Simulation not available - reload FitnessPlayer');
        return;
      }

      // Listen for state changes
      window.opener.addEventListener('sim-state-change', render);

      render();
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `<div class="error">${msg}</div>`;
    }

    function render() {
      if (!controller) return;

      const devices = controller.getDevices();
      const govState = controller.getGovernanceState();
      const equipment = (controller.getEquipment?.() || []);

      let html = '';

      // ---------------------------------------------------------------------
      // Governance section
      // ---------------------------------------------------------------------
      html += `<div class="section">
        <div class="section-title">Governance</div>
        <div class="gov-status">
          <span>Phase: ${govState.phase || 'none'}</span>
          <span>Challenge: ${govState.activeChallenge ? (govState.activeChallenge.targetZone || govState.activeChallenge.type || 'active') : 'none'}</span>
        </div>`;

      // Show active cycle challenge details if present in window.__fitnessGovernance
      const cycleInfo = readCycleChallengeInfo();
      if (cycleInfo) {
        html += `<div class="gov-cycle-info">
          <div><strong>Cycle Challenge</strong> — ${escapeHtml(cycleInfo.equipment || 'equipment')}</div>
          <div>Rider: ${escapeHtml(cycleInfo.riderId || '—')} · State: ${escapeHtml(cycleInfo.cycleState || '—')}</div>
          <div>Phase ${cycleInfo.currentPhaseIndex ?? '—'} / ${cycleInfo.totalPhases ?? '—'} · Progress: ${cycleInfo.phaseProgressPct ?? 0}%</div>
          <div>RPM: ${cycleInfo.currentRpm ?? '—'}</div>
        </div>`;
      }

      html += `<div class="btn-row">
          <button onclick="toggleGovernance()">${govState.phase ? 'Disable Gov' : 'Enable Gov'}</button>
          <button onclick="triggerChallenge()" ${!govState.phase ? 'disabled' : ''}>Trigger Challenge</button>
        </div>
      </div>`;

      // ---------------------------------------------------------------------
      // Bulk actions
      // ---------------------------------------------------------------------
      html += `<div class="section">
        <div class="section-title">Bulk Actions</div>
        <div class="btn-row">
          <button onclick="activateAll('active')">Activate All</button>
          <button onclick="autoSessionAll()">Auto Session All</button>
          <button onclick="stopAll()" class="danger">Stop All</button>
        </div>
      </div>`;

      // ---------------------------------------------------------------------
      // HR device list
      // ---------------------------------------------------------------------
      html += `<div class="section">
        <div class="section-title">HR Devices (${devices.length})</div>
        <div class="device-list">`;

      for (const d of devices) {
        const hrDisplay = d.currentHR ? `${d.currentHR} bpm` : '-- bpm';
        const hrClass = d.isActive ? '' : 'inactive';
        const autoLabel = d.autoMode ? `<span class="auto-indicator">${d.autoMode}</span>` : '';

        const sliderHR = (activeSlider === d.deviceId)
          ? (sliderValues[d.deviceId] || d.currentHR || 80)
          : (d.currentHR || sliderValues[d.deviceId] || 80);
        sliderValues[d.deviceId] = sliderHR;

        const zoneColor = getZoneColor(d.currentZone);

        html += `<div class="device">
          <div class="device-header">
            <span class="device-name">${escapeHtml(d.name)} (${escapeHtml(d.deviceId)})${autoLabel}</span>
            <span class="device-hr ${hrClass}">${hrDisplay}</span>
          </div>
          <div class="hr-slider-row">
            <span style="font-size:10px;color:#666">40</span>
            <input type="range" class="hr-slider" min="40" max="220" value="${sliderHR}"
                   id="slider-${d.deviceId}"
                   style="accent-color:${zoneColor}"
                   oninput="onSliderInput('${d.deviceId}', this.value)"
                   onchange="onSliderChange('${d.deviceId}', this.value)"
                   onmousedown="activeSlider='${d.deviceId}'"
                   onmouseup="activeSlider=null"
                   ontouchstart="activeSlider='${d.deviceId}'"
                   ontouchend="activeSlider=null">
            <span class="hr-value" id="hr-val-${d.deviceId}" style="color:${zoneColor}">${sliderHR} bpm</span>
          </div>
          <div class="zone-buttons">
            ${['cool', 'active', 'warm', 'hot', 'fire'].map(z =>
              `<button class="zone-btn ${z} ${d.currentZone === z ? 'selected' : ''}"
                       onclick="setZone('${d.deviceId}', '${z}')">${z}</button>`
            ).join('')}
          </div>
          <div class="auto-buttons">
            <button onclick="startAuto('${d.deviceId}')">auto</button>
            <button onclick="startSession('${d.deviceId}')">session</button>
            <button onclick="stopDevice('${d.deviceId}')" class="danger">stop</button>
          </div>
        </div>`;
      }

      html += '</div></div>';

      // ---------------------------------------------------------------------
      // Equipment (cycling)
      // ---------------------------------------------------------------------
      html += `<div class="section">
        <div class="section-title">Equipment — Cycling (${equipment.length})</div>
        <div class="equipment-list">`;

      if (equipment.length === 0) {
        html += `<div style="color:#666;font-size:11px;padding:8px">No cycle-capable equipment in session catalog.</div>`;
      }

      for (const e of equipment) {
        const rpmDisplay = e.currentRpm != null ? `${e.currentRpm} rpm` : '-- rpm';
        const rpmClass = e.isActive ? '' : 'inactive';

        const sliderRpm = (activeEquipmentSlider === e.equipmentId)
          ? (equipmentSliderValues[e.equipmentId] ?? e.currentRpm ?? 0)
          : (e.currentRpm ?? equipmentSliderValues[e.equipmentId] ?? 0);
        equipmentSliderValues[e.equipmentId] = sliderRpm;

        const eligible = (e.eligibleUsers || []).join(', ') || '—';

        html += `<div class="equipment-tile">
          <div class="equipment-header">
            <span class="equipment-name">${escapeHtml(e.name)} <span style="color:#888;font-size:10px">(${escapeHtml(e.equipmentId)} / cad:${escapeHtml(e.cadenceDeviceId)})</span></span>
            <span class="equipment-rpm ${rpmClass}">${rpmDisplay}</span>
          </div>
          <div class="equipment-eligible">eligible: ${escapeHtml(eligible)}</div>
          <div class="rpm-slider-row">
            <span style="font-size:10px;color:#666">0</span>
            <input type="range" class="rpm-slider" min="0" max="150" value="${sliderRpm}"
                   id="rpm-slider-${e.equipmentId}"
                   oninput="onRpmSliderInput('${e.equipmentId}', this.value)"
                   onchange="onRpmSliderChange('${e.equipmentId}', this.value)"
                   onmousedown="activeEquipmentSlider='${e.equipmentId}'"
                   onmouseup="activeEquipmentSlider=null"
                   ontouchstart="activeEquipmentSlider='${e.equipmentId}'"
                   ontouchend="activeEquipmentSlider=null">
            <span class="rpm-value" id="rpm-val-${e.equipmentId}">${sliderRpm} rpm</span>
          </div>
          <div class="rpm-quick-row">
            ${[0, 40, 60, 80, 100].map(v =>
              `<button class="rpm-quick-btn" onclick="setRpmQuick('${e.equipmentId}', ${v})">${v}</button>`
            ).join('')}
            <button class="rpm-quick-btn danger" onclick="stopEquipment('${e.equipmentId}')">stop</button>
          </div>
        </div>`;
      }

      html += '</div></div>';

      // ---------------------------------------------------------------------
      // Cycle Challenge controls
      // ---------------------------------------------------------------------
      html += `<div class="section">
        <div class="section-title">Cycle Challenge</div>
        <div class="cycle-ctrl">
          <select id="cycle-selection-picker" onchange="updateRiderPicker()"></select>
          <select id="cycle-rider-picker"></select>
          <div class="btn-row">
            <button onclick="triggerCycleChallenge()">Trigger Cycle</button>
            <button onclick="swapCycleRider()">Swap Rider</button>
          </div>
          <div class="btn-row">
            <button id="cycle-demo-btn" onclick="runCycleDemo()" style="background:#5a3d10;flex:1">▶ Run Cycle Demo (~3 min)</button>
          </div>
          <div id="cycle-demo-status" style="font-size:11px;color:#bbb;padding:4px 0;min-height:14px"></div>
        </div>
      </div>`;

      document.getElementById('content').innerHTML = html;

      // Re-populate dropdowns after DOM replace
      updateCycleSelectionPicker();
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function readCycleChallengeInfo() {
      try {
        const gov = window.opener?.__fitnessGovernance;
        if (!gov) return null;
        if (!gov.activeChallenge) return null;
        // Convention: if engine exposes cycleState on window, surface it
        if (gov.activeChallengeType && gov.activeChallengeType !== 'cycle') return null;
        if (!gov.cycleState && !gov.currentRpm && !gov.riderId) return null;
        return {
          equipment: gov.activeChallengeEquipment || gov.equipment || null,
          riderId: gov.riderId || null,
          cycleState: gov.cycleState || null,
          currentPhaseIndex: gov.currentPhaseIndex ?? null,
          totalPhases: gov.totalPhases ?? null,
          currentRpm: gov.currentRpm ?? null,
          phaseProgressPct: gov.phaseProgressPct ?? null
        };
      } catch (_) {
        return null;
      }
    }

    function getZoneColor(zone) {
      const colors = {
        cool: '#2563eb',
        active: '#059669',
        warm: '#d97706',
        hot: '#dc2626',
        fire: '#7c2d12'
      };
      return colors[zone] || '#888';
    }

    // ---------------------------------------------------------------------
    // HR slider handlers
    // ---------------------------------------------------------------------
    function onSliderInput(deviceId, value) {
      const hr = parseInt(value, 10);
      sliderValues[deviceId] = hr;
      const label = document.getElementById('hr-val-' + deviceId);
      if (label) {
        const zone = controller._hrToZone(hr);
        label.textContent = hr + ' bpm';
        label.style.color = getZoneColor(zone);
      }
      controller.setHR(deviceId, hr);
    }

    function onSliderChange(deviceId, value) {
      const hr = parseInt(value, 10);
      sliderValues[deviceId] = hr;
      activeSlider = null;
      controller.setHR(deviceId, hr);
    }

    function setZone(deviceId, zone) { controller.setZone(deviceId, zone); }
    function startAuto(deviceId) { controller.startAuto(deviceId); }
    function startSession(deviceId) { controller.startAutoSession(deviceId); }
    function stopDevice(deviceId) { controller.stopDevice(deviceId); }
    function activateAll(zone) { controller.activateAll(zone); }
    function autoSessionAll() { controller.startAutoSessionAll(); }
    function stopAll() { controller.stopAll(); }

    function toggleGovernance() {
      const state = controller.getGovernanceState();
      if (state.phase) {
        controller.disableGovernance();
      } else {
        controller.enableGovernance();
      }
      render();
    }

    function triggerChallenge() {
      controller.triggerChallenge({ targetZone: 'hot' });
      render();
    }

    // ---------------------------------------------------------------------
    // RPM / equipment handlers
    // ---------------------------------------------------------------------
    function onRpmSliderInput(equipmentId, value) {
      const rpm = parseInt(value, 10);
      equipmentSliderValues[equipmentId] = rpm;
      const label = document.getElementById('rpm-val-' + equipmentId);
      if (label) label.textContent = rpm + ' rpm';
      controller.setRpm(equipmentId, rpm);
    }

    function onRpmSliderChange(equipmentId, value) {
      const rpm = parseInt(value, 10);
      equipmentSliderValues[equipmentId] = rpm;
      activeEquipmentSlider = null;
      controller.setRpm(equipmentId, rpm);
    }

    function setRpmQuick(equipmentId, rpm) {
      controller.setRpm(equipmentId, rpm);
      const slider = document.getElementById('rpm-slider-' + equipmentId);
      if (slider) slider.value = rpm;
      const label = document.getElementById('rpm-val-' + equipmentId);
      if (label) label.textContent = rpm + ' rpm';
      equipmentSliderValues[equipmentId] = rpm;
      render();
    }

    function stopEquipment(equipmentId) {
      controller.stopEquipment(equipmentId);
      equipmentSliderValues[equipmentId] = 0;
      render();
    }

    function triggerCycleChallenge() {
      const sel = document.getElementById('cycle-selection-picker')?.value;
      const riderRaw = document.getElementById('cycle-rider-picker')?.value;
      if (!sel) { alert('Pick a cycle selection'); return; }
      const result = controller.triggerCycleChallenge({
        selectionId: sel,
        riderId: riderRaw || undefined
      });
      if (!result?.success) {
        alert(`Trigger failed: ${result?.reason || 'unknown'}`);
      }
      render();
    }

    function swapCycleRider() {
      const riderId = document.getElementById('cycle-rider-picker')?.value;
      if (!riderId) { alert('Pick a rider to swap to'); return; }
      const result = controller.swapCycleRider(riderId, { force: true });
      if (!result?.success) {
        alert(`Swap failed: ${result?.reason || 'unknown'}`);
      }
      render();
    }

    let cycleDemoActive = false;
    let cycleDemoRpmHold = null;

    function setDemoStatus(text) {
      const el = document.getElementById('cycle-demo-status');
      if (el) el.textContent = text;
    }

    function setDemoRpm(equipmentId, rpm, sustained) {
      if (cycleDemoRpmHold) { clearInterval(cycleDemoRpmHold); cycleDemoRpmHold = null; }
      controller.setRpm(equipmentId, rpm);
      if (sustained) {
        // The cycle SM reads RPM from cadence map; freshness is per-message, so
        // re-send every second to keep the cached value warm.
        cycleDemoRpmHold = setInterval(() => controller.setRpm(equipmentId, rpm), 1000);
      }
    }

    async function runCycleDemo() {
      if (cycleDemoActive) return;
      cycleDemoActive = true;
      const btn = document.getElementById('cycle-demo-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏵ Running…'; }

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      try {
        const equipment = controller.getEquipment?.() || [];
        const cycleAce = equipment.find(e => e.equipmentId === 'cycle_ace');
        if (!cycleAce) { alert('No cycle_ace equipment found.'); return; }

        const selections = controller.listCycleSelections?.() || [];
        const sel = selections.find(s => s.equipment === 'cycle_ace');
        if (!sel) { alert('No cycle selection found in policy set.'); return; }

        const riderId = cycleAce.eligibleUsers?.[0];

        // 1. Activate two HR devices
        setDemoStatus('1/8 Activating HR session for 2 devices…');
        const devices = controller.getDevices();
        devices.slice(0, 2).forEach(d => controller.startAutoSession(d.deviceId, { phaseOffset: 200 }));
        await sleep(3000);

        // 2. Trigger
        setDemoStatus(`2/8 Triggering cycle challenge — rider=${riderId || 'auto'}`);
        const trig = controller.triggerCycleChallenge({ selectionId: sel.id, riderId });
        if (!trig?.success) {
          setDemoStatus(`Trigger failed: ${trig?.reason || 'unknown'}`);
          alert(`Trigger failed: ${trig?.reason || 'unknown'}`);
          return;
        }
        render();

        // 3. INIT — RPM 0
        setDemoStatus('3/8 INIT — RPM 0, slate-blue ring (6s)');
        setDemoRpm('cycle_ace', 0, false);
        await sleep(6000);

        // 4. RAMP — RPM 35
        setDemoStatus('4/8 RAMP — RPM 35, ring should turn warm yellow (6s)');
        setDemoRpm('cycle_ace', 35, true);
        await sleep(6000);

        // 5. MAINTAIN — RPM 75
        setDemoStatus('5/8 MAINTAIN — RPM 75, ring should turn green (8s)');
        setDemoRpm('cycle_ace', 75, true);
        await sleep(8000);

        // 6. LOCKED — RPM 0
        setDemoStatus('6/8 LOCKED — RPM 0, ring red, video dims (8s)');
        setDemoRpm('cycle_ace', 0, false);
        await sleep(8000);

        // 7. RECOVER — RPM 80
        setDemoStatus('7/8 RECOVER — RPM 80, unlocking back to ramp/maintain (8s)');
        setDemoRpm('cycle_ace', 80, true);
        await sleep(8000);

        // 8. PHASES — RPM 85 sustained until clear or timeout
        setDemoStatus('8/8 PHASES — RPM 85, advancing to success…');
        setDemoRpm('cycle_ace', 85, true);
        const deadline = Date.now() + 120000;
        while (Date.now() < deadline) {
          const gov = window.opener?.__fitnessGovernance;
          if (!gov || gov.activeChallengeType !== 'cycle') break;
          setDemoStatus(`8/8 PHASES — phase ${(gov.currentPhaseIndex ?? 0) + 1}/${gov.totalPhases}, state=${gov.cycleState}, rpm=${gov.currentRpm}`);
          await sleep(1500);
        }
        setDemoStatus('Done. Cycle cleared.');
      } catch (err) {
        setDemoStatus('Demo error: ' + (err?.message || err));
        console.error(err);
      } finally {
        if (cycleDemoRpmHold) { clearInterval(cycleDemoRpmHold); cycleDemoRpmHold = null; }
        cycleDemoActive = false;
        const btnEl = document.getElementById('cycle-demo-btn');
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '▶ Run Cycle Demo (~3 min)'; }
      }
    }

    function updateCycleSelectionPicker() {
      const selections = controller.listCycleSelections?.() || [];
      const picker = document.getElementById('cycle-selection-picker');
      if (!picker) return;
      const current = picker.value;
      picker.innerHTML = selections.length
        ? selections.map(s =>
            `<option value="${escapeHtml(s.id)}">${escapeHtml(s.label || s.id)} (${escapeHtml(s.equipment || '')})</option>`
          ).join('')
        : '<option value="">(no cycle selections)</option>';
      if (current && selections.some(s => s.id === current)) picker.value = current;
      updateRiderPicker();
    }

    function updateRiderPicker() {
      const sel = document.getElementById('cycle-selection-picker')?.value;
      const picker = document.getElementById('cycle-rider-picker');
      if (!picker) return;
      const selections = controller.listCycleSelections?.() || [];
      const match = selections.find(s => s.id === sel);
      const equipment = match
        ? (controller.getEquipment?.() || []).find(e => e.equipmentId === match.equipment)
        : null;
      const riders = equipment?.eligibleUsers || [];
      const current = picker.value;
      picker.innerHTML = '<option value="">Random rider</option>' +
        riders.map(r => `<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join('');
      if (current && (current === '' || riders.includes(current))) picker.value = current;
    }

    // Initialize
    init();
  </script>
</body>
</html>
