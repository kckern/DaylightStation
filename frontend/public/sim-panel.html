<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Fitness Simulation Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 12px;
      font-size: 13px;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .error {
      background: #8b0000;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .section {
      background: #252525;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }
    .gov-status {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .gov-status span {
      font-size: 12px;
    }
    .gov-cycle-info {
      background: #1e1e1e;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: #ccc;
      line-height: 1.5;
    }
    .gov-cycle-info strong {
      color: #f39c12;
    }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    button {
      background: #3a3a3a;
      border: none;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #4a4a4a; }
    button:active { background: #555; }
    button.danger { background: #6b2020; }
    button.danger:hover { background: #8b3030; }
    .device-list {
      max-height: none;
      overflow-y: auto;
    }
    .device {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .device-name {
      font-weight: 500;
    }
    .device-hr {
      font-family: monospace;
      font-size: 14px;
    }
    .device-hr.inactive { color: #666; }
    .hr-slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .hr-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    .hr-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #888;
    }
    .hr-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      cursor: pointer;
      border: 2px solid #888;
    }
    .hr-value {
      font-family: monospace;
      font-size: 13px;
      min-width: 52px;
      text-align: right;
    }
    .zone-buttons {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .zone-btn {
      flex: 1;
      padding: 4px 2px;
      font-size: 10px;
      border-radius: 3px;
      text-align: center;
    }
    .zone-btn.cool { background: #2563eb; }
    .zone-btn.active { background: #059669; }
    .zone-btn.warm { background: #d97706; }
    .zone-btn.hot { background: #dc2626; }
    .zone-btn.fire { background: #7c2d12; }
    .zone-btn.selected { outline: 2px solid white; }
    .auto-buttons {
      display: flex;
      gap: 4px;
    }
    .auto-buttons button {
      flex: 1;
      font-size: 11px;
      padding: 4px;
    }
    .auto-indicator {
      background: #059669;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
    }

    /* Equipment (cycling) — orange accent to distinguish from HR devices */
    .equipment-list {
      max-height: none;
      overflow-y: auto;
    }
    .equipment-tile {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      border-left: 3px solid #f39c12;
    }
    .equipment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .equipment-name {
      font-weight: 500;
    }
    .equipment-rpm {
      font-family: monospace;
      font-size: 14px;
      color: #f39c12;
    }
    .equipment-rpm.inactive { color: #666; }
    .equipment-eligible {
      font-size: 10px;
      color: #888;
      margin-bottom: 8px;
    }
    .rpm-slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .rpm-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
      accent-color: #f39c12;
    }
    .rpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      cursor: pointer;
      border: 2px solid #c97a0a;
    }
    .rpm-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      cursor: pointer;
      border: 2px solid #c97a0a;
    }
    .rpm-value {
      font-family: monospace;
      font-size: 13px;
      min-width: 64px;
      text-align: right;
      color: #f39c12;
    }
    .rpm-quick-row {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .rpm-quick-btn {
      flex: 1;
      font-size: 11px;
      padding: 4px 2px;
      background: #3b2a12;
    }
    .rpm-quick-btn:hover { background: #553d1a; }

    .cycle-ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cycle-ctrl select {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      font-size: 12px;
    }
    .cycle-ctrl .btn-row button {
      flex: 1;
      background: #5a3d10;
    }
    .cycle-ctrl .btn-row button:hover { background: #7a5418; }

    .tabs { display:flex; gap:4px; margin:10px 0 8px; }
    .tab { flex:1; background:#2a2a2a; border:none; color:#aaa; padding:8px; border-radius:6px 6px 0 0; cursor:pointer; font-size:13px; }
    .tab.active { background:#3a3a3a; color:#fff; font-weight:600; }
    .quick { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .quick-btn { flex:1 1 auto; padding:10px; font-size:13px; background:#34507a; border:none; color:#fff; border-radius:6px; cursor:pointer; }
    .quick-btn:hover { background:#3f5f92; }
    .quick-btn.danger { background:#6b2020; }
    .quick-btn.danger:hover { background:#8b3030; }
    .cg-toggle { display:inline-flex; gap:2px; }
    .cg-win { padding:6px 10px; font-size:12px; background:#2a2a2a; border:none; color:#bbb; border-radius:4px; cursor:pointer; }
    .cg-win.selected { background:#5a3d10; color:#fff; }

    #race-banner { background:#16210f; border:1px solid #2f4a22; border-radius:6px; padding:8px 10px; margin-bottom:10px; font-size:12px; line-height:1.6; }
    #race-banner .rb-title { font-weight:600; color:#8fd14f; margin-bottom:4px; }
    #race-banner .rb-bike { font-family:monospace; }
    #race-banner .rb-ok { color:#9fe07a; }
    #race-banner .rb-warn { color:#f3b341; }
    #race-banner .rb-bad { color:#e76d5a; }
  </style>
</head>
<body>
  <div id="app">
    <h1>
      Fitness Simulation Panel
      <button onclick="window.close()">X</button>
    </h1>
    <!-- Live race feedback, OUTSIDE #content so render() (which rebuilds #content
         on every sim-state-change) never wipes it mid-race. -->
    <div id="race-banner" style="display:none"></div>
    <div id="content">Loading...</div>
  </div>

  <script>
    let controller = null;
    let activeTab = 'riders';          // persists across re-renders
    const sliderValues = {};
    let activeSlider = null;
    const rpmSliderValues = {};
    let activeRpmSlider = null;

    function init() {
      if (!window.opener) { showError('Open this panel from the Fitness app'); return; }
      controller = window.opener.__fitnessSimController;
      if (!controller) { showError('Simulation not available — reload the Fitness app'); return; }
      window.opener.addEventListener('sim-state-change', render);
      render();
    }
    function showError(msg) { document.getElementById('content').innerHTML = `<div class="error">${msg}</div>`; }
    function escapeHtml(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function zoneColor(z){ return ({cool:'#2563eb',active:'#059669',warm:'#d97706',hot:'#dc2626',fire:'#7c2d12'})[z]||'#888'; }

    // ----- Quick Sims -----
    function cycleRaceWin(win){ window.__cgWin = win; document.querySelectorAll('.cg-win').forEach(b=>b.classList.toggle('selected', b.dataset.win===win)); }
    function setRaceStatus(html, show = true) {
      const el = document.getElementById('race-banner');
      if (!el) return;
      el.style.display = show ? 'block' : 'none';
      el.innerHTML = html;
    }

    // Closed-loop cycle-game race driver. Instead of firing RPM and praying, it
    // reads __cycleGameControl.getRaceState() each tick and self-corrects:
    //   • a false-started (penalty-boxed) bike is dropped to RPM 0 — the box
    //     releases ONLY at rest, so holding throttle would lock it for the whole race;
    //   • if the whole field makes no forward progress for several seconds it runs a
    //     recovery (release all throttle to drain any latent lock), then escalates;
    //   • live per-bike distance/state is shown in the banner so progress is visible.
    async function runCycleGameRace() {
      const win = window.__cgWin || 'time';
      const value = win === 'time' ? 60 : 100;
      const opener = window.opener;
      const sleep = (ms)=>new Promise(r=>setTimeout(r,ms));
      const assigns = controller.autoAssignRiders(2);
      if (assigns.length === 0) { alert('No bikes available to race.'); return; }
      if (typeof opener.__fitnessLaunchModule !== 'function') { alert('Launch seam missing — reload the Fitness app.'); return; }
      const bikeIds = assigns.map((a) => a.equipmentId);

      // Hold the assigned bikes at 0 rpm from the outset (driveRpmArc stops any prior
      // arc, then sends a steady 0 each second) so they can't trip the false-start
      // rule during the countdown.
      bikeIds.forEach((id) => controller.driveRpmArc(id, { base: 0, amp: 0 }));
      setRaceStatus('<div class="rb-title">🚴 Launching race…</div>Holding bikes at 0 through the countdown.');
      opener.__fitnessLaunchModule('cycle_game');

      const deadline = Date.now() + 5000;
      while (!(opener.__cycleGameControl && opener.__cycleGameControl.ready)) {
        if (Date.now() > deadline) { setRaceStatus('<div class="rb-bad">Cycle game didn\'t start (control hook never appeared).</div>'); return; }
        await sleep(200);
      }
      const ctl = opener.__cycleGameControl;
      const phaseOf = () => (ctl.getPhase ? ctl.getPhase() : null);
      const hasFeedback = typeof ctl.getRaceState === 'function';
      const raceStateOf = () => (hasFeedback ? ctl.getRaceState() : null);

      ctl.startRace({ winCondition: win, value });

      // Wait for the green light. Bikes are still held at 0 → no false start.
      // NOTE: the phase is a TRANSIENT 'idle' for the first frame after startRace
      // (React hasn't flushed setPhase('staging') yet), so 'idle' is only an abort
      // signal AFTER we've seen the race actually begin staging — otherwise we'd
      // bail before the race even starts and leave the bikes to idle-DNF.
      const greenBy = Date.now() + 30000;
      let phase = phaseOf();
      let sawStart = false;
      while (Date.now() < greenBy && phase !== 'racing') {
        if (phase === 'staging' || phase === 'countdown') sawStart = true;
        if (phase === 'results') break;                 // race already over
        if (phase === 'idle' && sawStart) break;         // returned to idle = cancelled
        setRaceStatus(`<div class="rb-title">🚦 Staging…</div>phase: ${escapeHtml(String(phase))}`);
        await sleep(150);
        phase = phaseOf();
      }
      if (phase !== 'racing') {
        setRaceStatus('<div class="rb-bad">Race never reached the green light — bikes left idle.</div>');
        bikeIds.forEach((id) => controller.stopRpmArc(id));
        return;
      }

      // GREEN LIGHT — but the render phase flips to 'racing' up to one engine tick
      // BEFORE the engine runs its first-tick green-light (false-start) check. If we
      // drove now, our own RPM would trip that check and box our bikes. So keep the
      // hold-at-0 arc running across that first tick, THEN take manual control — the
      // first tick reads RPM 0, no self-inflicted false start.
      setRaceStatus('<div class="rb-title">🟢 Green — settling the start…</div>Holding 0 across the first tick.');
      await sleep(1400);
      bikeIds.forEach((id) => controller.stopRpmArc(id));

      // Per-bike INDEPENDENT wandering RPM. A shared sine made the bikes track each
      // other (fixed gap → same result every time); instead each bike random-walks on
      // its own, with occasional surges/fades, floored well above 0 so it never idles
      // or DNFs. Different starts + independent noise make the field diverge and the
      // outcome vary run to run.
      const RPM_MIN = 58, RPM_MAX = 118;
      const rpmState = {};
      bikeIds.forEach((id, i) => { rpmState[id] = 76 + i * 8 + Math.random() * 10; });
      const nextRpm = (id) => {
        const cur = rpmState[id] ?? 88;
        const revert = (88 - cur) * 0.10;                                        // gentle pull off the rails
        const wander = (Math.random() - 0.5) * 26;                               // ±13 rpm drift
        const surge = Math.random() < 0.18 ? (Math.random() - 0.5) * 50 : 0;      // occasional kick
        let v = cur + revert + wander + surge;
        v = Math.max(RPM_MIN, Math.min(RPM_MAX, v));
        rpmState[id] = v;
        return Math.round(v);
      };
      const last = {};            // equipmentId -> last distanceM
      const lastAdvanceAt = {};   // equipmentId -> wall time it last gained ground
      let lastFieldProgressAt = Date.now();
      let recoveries = 0;
      let iter = 0;

      // Re-send cadence FAST (the game's needle goes stale well under a second, so a
      // 1 Hz re-send dropped it to 0 between sends). Wander each bike's TARGET only
      // every ~1.4 s so it's lively but not jittery; the in-between sends just hold
      // the current target to keep the needle warm.
      const SEND_MS = 350;
      const TARGET_EVERY = 4;     // 4 × 350ms ≈ 1.4 s between random-walk steps
      bikeIds.forEach((id) => { lastAdvanceAt[id] = Date.now(); });

      const stopBy = Date.now() + (win === 'time' ? value * 1000 : 300000) + 30000;
      while (Date.now() < stopBy) {
        phase = phaseOf();
        if (!phase || phase === 'results' || phase === 'idle') break;

        const rs = raceStateOf();
        const byBike = {};
        (rs?.riders || []).forEach((r) => { if (r.equipmentId) byBike[r.equipmentId] = r; });
        const stepTarget = (iter % TARGET_EVERY === 0);
        const nowMs = Date.now();

        let fieldAdvanced = false;
        const rows = bikeIds.map((id) => {
          const r = byBike[id];
          const dist = r?.distanceM ?? 0;
          const prev = last[id] ?? 0;
          if (dist > prev + 0.5) { fieldAdvanced = true; lastAdvanceAt[id] = nowMs; }

          let rpm, cls = 'rb-ok', state, releaseBox = false;
          if (r?.finished) {
            rpm = 0; state = 'FINISHED';
          } else if (r?.boxed) {
            // FALSE START — meter locked. The box opens only at a clean RPM 0, but a
            // plain setRpm(0) can still read non-zero (cadence is derived from
            // revolution deltas). So force the cadence STALE (stopEquipment) → it
            // zeroes and the box reliably releases.
            releaseBox = true; cls = 'rb-warn';
            state = `⚠ FALSE START — clearing (${r.penaltyRemainingS | 0}s${r.awaitingStop ? ', at rest' : ''})`;
          } else {
            if (stepTarget) nextRpm(id);                  // wander the target ~every 1.4 s
            rpm = Math.round(rpmState[id] ?? 80);          // re-send every 350 ms (warm needle)
            const idleMs = nowMs - (lastAdvanceAt[id] ?? nowMs);
            if (idleMs > 3000) { cls = 'rb-warn'; state = `⚠ not advancing (${(idleMs / 1000) | 0}s) — driving ${rpm}`; }
            else state = `driving ${rpm} rpm`;
          }
          if (releaseBox) controller.stopEquipment(id); else controller.setRpm(id, rpm);
          last[id] = dist;
          const nm = r?.userId || id;
          return `<div class="rb-bike ${cls}">${escapeHtml(String(nm))}: ${dist | 0} m · ${state}</div>`;
        });

        if (fieldAdvanced) lastFieldProgressAt = nowMs;
        const stalledMs = nowMs - lastFieldProgressAt;
        let banner = `<div class="rb-title">🏁 RACING</div>${rows.join('')}`;
        if (!hasFeedback) banner += '<div class="rb-warn">No race-state feedback (update the app) — driving blind.</div>';

        // Field watchdog — wall-time, since the game advances distance only ~once a
        // second (tick-counting would false-trip at the 350 ms send rate). No progress
        // for a while → drain any latent lock, then re-drive; abort if still stuck.
        if (hasFeedback && stalledMs > 4000 && recoveries < 2) {
          recoveries++;
          setRaceStatus(banner + `<div class="rb-warn">No field progress for ${(stalledMs / 1000) | 0}s — recovery ${recoveries}/2: releasing throttle to clear locks…</div>`);
          bikeIds.forEach((id) => controller.stopEquipment(id));
          await sleep(2500);
          lastFieldProgressAt = Date.now();
          iter++;
          continue;
        }
        if (hasFeedback && stalledMs > 8000) {
          setRaceStatus(banner + '<div class="rb-bad">Simulation not progressing after recovery — aborting drive. Check the race screen.</div>');
          bikeIds.forEach((id) => controller.stopEquipment(id));
          return;
        }

        setRaceStatus(banner);
        await sleep(SEND_MS);
        iter++;
      }

      bikeIds.forEach((id) => controller.stopRpmArc(id));
      setRaceStatus('<div class="rb-title rb-ok">✅ Race complete.</div>');
      await sleep(4000);
      setRaceStatus('', false);
    }
    function runAmbient(){ controller.startAmbientWorkout(); render(); }
    function stopAll(){ controller.stopEverything(); render(); }

    // ----- Tabs -----
    function setTab(t){ activeTab = t; render(); }

    // ----- Per-device control handlers -----
    function onHrInput(id,v){ const hr=parseInt(v,10); sliderValues[id]=hr; const l=document.getElementById('hr-'+id); if(l){l.textContent=hr+' bpm'; l.style.color=zoneColor(controller._hrToZone(hr));} controller.setHR(id,hr); }
    function onHrChange(id,v){ sliderValues[id]=parseInt(v,10); activeSlider=null; controller.setHR(id,parseInt(v,10)); }
    function setZone(id,z){ controller.setZone(id,z); }
    function startSession(id){ controller.startAutoSession(id); }
    function stopDevice(id){ controller.stopDevice(id); }
    function onRpmInput(id,v){ const r=parseInt(v,10); rpmSliderValues[id]=r; const l=document.getElementById('rpm-'+id); if(l)l.textContent=r+' rpm'; controller.setRpm(id,r); }
    function onRpmChange(id,v){ rpmSliderValues[id]=parseInt(v,10); activeRpmSlider=null; controller.setRpm(id,parseInt(v,10)); }
    function setRpmQuick(id,r){ controller.setRpm(id,r); const s=document.getElementById('rpms-'+id); if(s)s.value=r; const l=document.getElementById('rpm-'+id); if(l)l.textContent=r+' rpm'; rpmSliderValues[id]=r; }
    function stopEquipment(id){ controller.stopRpmArc(id); render(); }
    function setRider(id,u){ if(u) controller.setEquipmentRider(id,u); render(); }

    // ----- Advanced: governance + cycle challenge -----
    function toggleGovernance(){ const s=controller.getGovernanceState(); s.phase?controller.disableGovernance():controller.enableGovernance(); render(); }
    function triggerChallenge(){ controller.triggerChallenge({ targetZone:'hot' }); render(); }
    function triggerCycleChallenge(){ const sel=document.getElementById('cyc-sel')?.value; const rider=document.getElementById('cyc-rider')?.value; if(!sel){alert('Pick a cycle selection');return;} const r=controller.triggerCycleChallenge({selectionId:sel, riderId:rider||undefined}); if(!r?.success) alert('Trigger failed: '+(r?.reason||'unknown')); render(); }
    function swapCycleRider(){ const rider=document.getElementById('cyc-rider')?.value; if(!rider){alert('Pick a rider');return;} const r=controller.swapCycleRider(rider,{force:true}); if(!r?.success) alert('Swap failed: '+(r?.reason||'unknown')); render(); }

    function render() {
      if (!controller) return;
      const devices = controller.getDevices();
      const equipment = controller.getEquipment?.() || [];
      const gov = controller.getGovernanceState();
      const win = window.__cgWin || 'time';
      let html = '';
      html += `<div class="section"><div class="section-title">Quick Sims</div>
        <div class="quick">
          <button class="quick-btn" onclick="runCycleGameRace()">🚴 Cycle Game Race</button>
          <span class="cg-toggle">
            <button class="cg-win${win==='time'?' selected':''}" data-win="time" onclick="cycleRaceWin('time')">Flash</button>
            <button class="cg-win${win==='distance'?' selected':''}" data-win="distance" onclick="cycleRaceWin('distance')">100 m</button>
          </span>
          <button class="quick-btn" onclick="runAmbient()">❤️ Ambient Workout</button>
          <button class="quick-btn danger" onclick="stopAll()">⏹ Stop All</button>
        </div></div>`;
      html += `<div class="tabs">
        ${['riders','bikes','advanced'].map(t=>`<button class="tab${activeTab===t?' active':''}" onclick="setTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
      </div>`;
      if (activeTab === 'riders') {
        html += `<div class="section">`;
        for (const d of devices) {
          const hr = (activeSlider===d.deviceId ? (sliderValues[d.deviceId]||d.currentHR||80) : (d.currentHR||sliderValues[d.deviceId]||80));
          sliderValues[d.deviceId]=hr; const zc=zoneColor(d.currentZone);
          html += `<div class="device">
            <div class="device-header"><span>${escapeHtml(d.name)}</span><span class="device-hr ${d.isActive?'':'inactive'}">${d.currentHR?d.currentHR+' bpm':'-- bpm'}</span></div>
            <div class="hr-slider-row">
              <input type="range" class="hr-slider" min="40" max="220" value="${hr}" style="accent-color:${zc}"
                     oninput="onHrInput('${d.deviceId}',this.value)" onchange="onHrChange('${d.deviceId}',this.value)"
                     onmousedown="activeSlider='${d.deviceId}'" onmouseup="activeSlider=null" ontouchstart="activeSlider='${d.deviceId}'" ontouchend="activeSlider=null">
              <span class="hr-value" id="hr-${d.deviceId}" style="color:${zc}">${hr} bpm</span>
            </div>
            <div class="zone-buttons">${['cool','active','warm','hot','fire'].map(z=>`<button class="zone-btn ${z}${d.currentZone===z?' selected':''}" onclick="setZone('${d.deviceId}','${z}')">${z}</button>`).join('')}</div>
            <div class="auto-buttons"><button onclick="startSession('${d.deviceId}')">▶ session</button><button class="danger" onclick="stopDevice('${d.deviceId}')">✕</button></div>
          </div>`;
        }
        html += `</div>`;
      } else if (activeTab === 'bikes') {
        html += `<div class="section">`;
        if (equipment.length===0) html += `<div style="color:#666;font-size:11px;padding:8px">No cycle-capable equipment.</div>`;
        for (const e of equipment) {
          const rpm = (activeRpmSlider===e.equipmentId ? (rpmSliderValues[e.equipmentId]??e.currentRpm??0) : (e.currentRpm??rpmSliderValues[e.equipmentId]??0));
          rpmSliderValues[e.equipmentId]=rpm;
          html += `<div class="equipment-tile">
            <div class="equipment-header"><span>${escapeHtml(e.name)}</span><span class="equipment-rpm ${e.isActive?'':'inactive'}">${e.currentRpm!=null?e.currentRpm+' rpm':'-- rpm'}</span></div>
            <div class="rpm-slider-row">
              <input type="range" class="rpm-slider" id="rpms-${e.equipmentId}" min="0" max="150" value="${rpm}"
                     oninput="onRpmInput('${e.equipmentId}',this.value)" onchange="onRpmChange('${e.equipmentId}',this.value)"
                     onmousedown="activeRpmSlider='${e.equipmentId}'" onmouseup="activeRpmSlider=null" ontouchstart="activeRpmSlider='${e.equipmentId}'" ontouchend="activeRpmSlider=null">
              <span class="rpm-value" id="rpm-${e.equipmentId}">${rpm} rpm</span>
            </div>
            <div class="rpm-quick-row">${[0,40,60,80,100].map(v=>`<button class="rpm-quick-btn" onclick="setRpmQuick('${e.equipmentId}',${v})">${v}</button>`).join('')}<button class="rpm-quick-btn danger" onclick="stopEquipment('${e.equipmentId}')">✕</button></div>
            <div class="rider-row"><span style="font-size:10px;color:#666">rider:</span>
              <select onchange="setRider('${e.equipmentId}',this.value)"><option value="">— none —</option>${(e.eligibleUsers||[]).map(u=>`<option value="${escapeHtml(u)}"${e.rider===u?' selected':''}>${escapeHtml(u)}</option>`).join('')}</select>
            </div>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="section"><div class="section-title">Governance</div>
          <div class="gov-status"><span>Phase: ${gov.phase||'none'}</span></div>
          <div class="btn-row"><button onclick="toggleGovernance()">${gov.phase?'Disable Gov':'Enable Gov'}</button><button onclick="triggerChallenge()" ${!gov.phase?'disabled':''}>Trigger HR Challenge</button></div></div>`;
        html += `<div class="section"><div class="section-title">Cycle Challenge</div>
          <div class="cycle-ctrl"><select id="cyc-sel" onchange="updateRiderPicker()"></select><select id="cyc-rider"></select>
            <div class="btn-row"><button onclick="triggerCycleChallenge()">Trigger Cycle</button><button onclick="swapCycleRider()">Swap Rider</button></div>
            <div class="btn-row"><button id="cycle-demo-btn" onclick="runCycleDemo()" style="flex:1">▶ Run Cycle Demo (~3 min)</button></div>
            <div id="cycle-demo-status" style="font-size:11px;color:#bbb;min-height:14px"></div></div></div>`;
      }
      document.getElementById('content').innerHTML = html;
      if (activeTab === 'advanced') updateCycleSelectionPicker();
    }

    // ----- Ported: runCycleDemo -----
    let cycleDemoActive = false;
    let cycleDemoRpmHold = null;

    function setDemoStatus(text) {
      const el = document.getElementById('cycle-demo-status');
      if (el) el.textContent = text;
    }

    function setDemoRpm(equipmentId, rpm, sustained) {
      if (cycleDemoRpmHold) { clearInterval(cycleDemoRpmHold); cycleDemoRpmHold = null; }
      controller.setRpm(equipmentId, rpm);
      if (sustained) {
        // The cycle SM reads RPM from cadence map; freshness is per-message, so
        // re-send every second to keep the cached value warm.
        cycleDemoRpmHold = setInterval(() => controller.setRpm(equipmentId, rpm), 1000);
      }
    }

    async function runCycleDemo() {
      if (cycleDemoActive) return;
      cycleDemoActive = true;
      const btn = document.getElementById('cycle-demo-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏵ Running…'; }

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      try {
        const equipment = controller.getEquipment?.() || [];
        const cycleAce = equipment.find(e => e.equipmentId === 'cycle_ace');
        if (!cycleAce) { alert('No cycle_ace equipment found.'); return; }

        const selections = controller.listCycleSelections?.() || [];
        const sel = selections.find(s => s.equipment === 'cycle_ace');
        if (!sel) { alert('No cycle selection found in policy set.'); return; }

        const riderId = cycleAce.eligibleUsers?.[0];

        // 1. Activate two HR devices
        setDemoStatus('1/8 Activating HR session for 2 devices…');
        const devices = controller.getDevices();
        devices.slice(0, 2).forEach(d => controller.startAutoSession(d.deviceId, { phaseOffset: 200 }));
        await sleep(3000);

        // 2. Trigger
        setDemoStatus(`2/8 Triggering cycle challenge — rider=${riderId || 'auto'}`);
        const trig = controller.triggerCycleChallenge({ selectionId: sel.id, riderId });
        if (!trig?.success) {
          setDemoStatus(`Trigger failed: ${trig?.reason || 'unknown'}`);
          alert(`Trigger failed: ${trig?.reason || 'unknown'}`);
          return;
        }
        render();

        // 3. INIT — RPM 0
        setDemoStatus('3/8 INIT — RPM 0, slate-blue ring (6s)');
        setDemoRpm('cycle_ace', 0, false);
        await sleep(6000);

        // 4. RAMP — RPM 35
        setDemoStatus('4/8 RAMP — RPM 35, ring should turn warm yellow (6s)');
        setDemoRpm('cycle_ace', 35, true);
        await sleep(6000);

        // 5. MAINTAIN — RPM 75
        setDemoStatus('5/8 MAINTAIN — RPM 75, ring should turn green (8s)');
        setDemoRpm('cycle_ace', 75, true);
        await sleep(8000);

        // 6. LOCKED — RPM 0
        setDemoStatus('6/8 LOCKED — RPM 0, ring red, video dims (8s)');
        setDemoRpm('cycle_ace', 0, false);
        await sleep(8000);

        // 7. RECOVER — RPM 80
        setDemoStatus('7/8 RECOVER — RPM 80, unlocking back to ramp/maintain (8s)');
        setDemoRpm('cycle_ace', 80, true);
        await sleep(8000);

        // 8. PHASES — RPM 85 sustained until clear or timeout
        setDemoStatus('8/8 PHASES — RPM 85, advancing to success…');
        setDemoRpm('cycle_ace', 85, true);
        const deadline = Date.now() + 120000;
        while (Date.now() < deadline) {
          const gov = window.opener?.__fitnessGovernance;
          if (!gov || gov.activeChallengeType !== 'cycle') break;
          setDemoStatus(`8/8 PHASES — phase ${(gov.currentPhaseIndex ?? 0) + 1}/${gov.totalPhases}, state=${gov.cycleState}, rpm=${gov.currentRpm}`);
          await sleep(1500);
        }
        setDemoStatus('Done. Cycle cleared.');
      } catch (err) {
        setDemoStatus('Demo error: ' + (err?.message || err));
        console.error(err);
      } finally {
        if (cycleDemoRpmHold) { clearInterval(cycleDemoRpmHold); cycleDemoRpmHold = null; }
        cycleDemoActive = false;
        const btnEl = document.getElementById('cycle-demo-btn');
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '▶ Run Cycle Demo (~3 min)'; }
      }
    }

    // ----- Ported: updateCycleSelectionPicker -----
    function updateCycleSelectionPicker() {
      const selections = controller.listCycleSelections?.() || [];
      const picker = document.getElementById('cyc-sel');
      if (!picker) return;
      const current = picker.value;
      picker.innerHTML = selections.length
        ? selections.map(s =>
            `<option value="${escapeHtml(s.id)}">${escapeHtml(s.label || s.id)} (${escapeHtml(s.equipment || '')})</option>`
          ).join('')
        : '<option value="">(no cycle selections)</option>';
      if (current && selections.some(s => s.id === current)) picker.value = current;
      updateRiderPicker();
    }

    // ----- Ported: updateRiderPicker -----
    function updateRiderPicker() {
      const sel = document.getElementById('cyc-sel')?.value;
      const picker = document.getElementById('cyc-rider');
      if (!picker) return;
      const selections = controller.listCycleSelections?.() || [];
      const match = selections.find(s => s.id === sel);
      const equipment = match
        ? (controller.getEquipment?.() || []).find(e => e.equipmentId === match.equipment)
        : null;
      const riders = equipment?.eligibleUsers || [];
      const current = picker.value;
      picker.innerHTML = '<option value="">Random rider</option>' +
        riders.map(r => `<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join('');
      if (current && (current === '' || riders.includes(current))) picker.value = current;
    }

    // Initialize
    init();
  </script>
</body>
</html>
